<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<style>
*{
    margin:0;
    padding:0;
   
}

body{
    background:#f4f4f4;
    height: 2000px;
    margin-top: 70px;
    background-image: linear-gradient(white, pink,white,orange);
}

.navbar{
    width: 100%;
    height: 80px;
    background:violet;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position: fixed;
    top: 0;
    margin-right: 30px;
 
}


h3{
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-left: 30px;
}


.nav-links{
    display:flex;
    list-style:none;
    gap:35px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:18px;
    margin-right: 30px;
}

</style>

</head>
<body>

<nav class="navbar">
    <h3>Pruthvi</h3>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    
</nav>

</body>
</html>
