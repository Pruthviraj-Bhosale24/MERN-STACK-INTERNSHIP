<!DOCTYPE html>
<html>
<head>
    <title> To-Do List</title>

    <style>

        body{
            background-color: #9df0f0;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container{
            width: 400px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px #000;
        }

        h1{
            text-align: center;
            color: #00e5ff;
        }

        input{
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .add-btn{
            padding: 10px;
            border: none;
            background-color: #00e5ff;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-btn:hover{
            background-color: #00bcd4;
        }

        li{
            background-color: #2c2c2c;
            color: white;
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn{
            background-color: crimson;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1> To-Do List</h1>

        <input type="text" id="task" placeholder="Enter task">
        <button class="add-btn" onclick="addTask()">Add</button>
        <h1 id="list"></h1>
        
    </div>

<script>

    let tasks = [];

    function addTask(){

        let task = document.getElementById("task").value;
        let list = document.getElementById("list").value;

        tasks.push(task);

        showTask();

        list.value = "";
    }

    function showTask(){

        let data = "";

        for(let i = 0; i < tasks.length; i++){

            data += "<li>" +
                    tasks[i] +
                    " <button class='delete-btn' onclick='deleteTask(" + i + ")'>Delete</button>" +
                    "</li>";
        }

        list.innerHTML = data;
    }

    function deleteTask(index){

        tasks.splice(index,1);

        showTask();
    }

</script>
</body>
</html>
