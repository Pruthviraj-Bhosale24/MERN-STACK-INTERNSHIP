<!DOCTYPE html>
<html>
<body>
<h2>Pattern Print</h2>
<pre id="output"></pre>

<script>
let ptr = "";

for (let i = 1; i <= 7; i++) {

    for (let j = 1; j <= 5; j++) {
        if (
            j == 1 ||
            (i == 1 && j == 5) ||
            (i == 2 && j == 4) ||
            (i == 3 && j == 3) ||
            (i == 4 && j == 2) ||
            (i == 5 && j == 3) ||
            (i == 6 && j == 4) ||
            (i == 7 && j == 5)
        ) {
            ptr += "*";
        } else {
            ptr += " ";
        }
    }
    ptr += "\n";
}
console.log(ptr);

document.getElementById("output").textContent = ptr;
</script>

</body>
</html>
