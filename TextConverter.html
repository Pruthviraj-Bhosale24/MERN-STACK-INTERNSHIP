<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin-left: 400px;
        }
        #content{
            border: 1px;

        }

        button{
                background-color: aquamarine;
                border-radius: 15px;
                height: 80px;
                width: auto;
       }

    </style>
</head>

<body>
    <h1>Text Converter</h1>
    <textarea name="n" id="content" rows="15" cols="60"></textarea>
    <br><br>
    <button onclick="convertToLower()">Convert Text to lowercase</button>
    <button onclick="convertToUpper()">Convert Text to uppercase</button>
    <button onclick="countWords()">Count Letters</button>

    
    <script>
        let text = document.getElementById("content");
        function convertToLower() {
            
            text.value = text.value.toLowerCase();
        }

        function convertToUpper() {
            text.value = text.value.toUpperCase();
        }

        function countWords() {
            let words = text.value.split(" ");
            alert("Word Count:" + words.length);
        }
    </script>
</body>

</html>
